<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>玄门守劫 App Store 页面包</title>

  <style>
    body {
      margin: 0;
      background: #f7f4ec;

      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.65;

    main {
      width: min(820px, calc(100% - 32px));

      list-style: none;

    li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid #ded2bb;
      border-radius: 8px;
      background: #fffdf6;
      padding: 14px;
    }
    a { color: #275c43; font-weight: 700; }
    span { color: #657064; }
    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #e9dec9;

</head>
<body>
  <main>
    <h1>玄门守劫 App Store 页面包</h1>
    <p>把本目录部署到 HTTPS 静态站点后，可将对应 URL 填入 App Store Connect。</p>
    <ul>
      <li>
<a href="privacy.html">玄门守劫隐私政策</a>
<span>可公开发布</span>

</html>
